<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    
    <!-- SEO -->
    <title>SkillPort — Dynamic Skill & Portfolio Matching Platform</title>
    <meta name="description" content="SkillPort replaces static resumes with dynamic, role-specific presentation cards. AI-powered matching connects multi-disciplinary talent with enterprise recruitment." />
    <meta name="keywords" content="portfolio, skills, matching, recruitment, AI, talent" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="SkillPort — Dynamic Skill & Portfolio Matching" />
    <meta property="og:description" content="Replace static resumes with dynamic portfolios. AI-powered talent matching for every profession." />
    <meta property="og:type" content="website" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
