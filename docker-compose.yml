# ============================================================
# SkillPort — Local Development Infrastructure
# Run: docker-compose up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # Primary Database (OLTP) — MongoDB
  # ----------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: skillport-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-skillport}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-skillport_secret}
      MONGO_INITDB_DATABASE: skillport
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillport-net

  # ----------------------------------------------------------
  # Analytics Database (OLAP) — ClickHouse
  # ----------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: skillport-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-skillport}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-skillport_secret}
      CLICKHOUSE_DB: skillport_analytics
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillport-net

  # ----------------------------------------------------------
  # Search Engine — OpenSearch
  # ----------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: skillport-opensearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=skillport-search
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - skillport-net

  # ----------------------------------------------------------
  # Vector Database — Milvus (Standalone)
  # Requires: etcd (metadata) + MinIO (object storage)
  # ----------------------------------------------------------
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: skillport-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillport-net

  minio:
    image: minio/minio:latest
    container_name: skillport-minio
    ports:
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillport-net

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: skillport-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - skillport-net

  # ----------------------------------------------------------
  # Event Streaming — Apache Kafka (KRaft mode, no ZooKeeper)
  # ----------------------------------------------------------
  kafka:
    image: apache/kafka:latest
    container_name: skillport-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "skillport-kafka-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - skillport-net

  # ----------------------------------------------------------
  # Task Queue — RabbitMQ (with Management UI)
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: skillport-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-skillport}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-skillport_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillport-net

  # ----------------------------------------------------------
  # In-Memory Cache & Session — Valkey (Redis-compatible)
  # ----------------------------------------------------------
  valkey:
    image: valkey/valkey:8
    container_name: skillport-valkey
    ports:
      - "6379:6379"
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillport-net

# ============================================================
# Volumes
# ============================================================
volumes:
  mongodb_data:
  clickhouse_data:
  opensearch_data:
  etcd_data:
  minio_data:
  milvus_data:
  kafka_data:
  rabbitmq_data:
  valkey_data:

# ============================================================
# Networks
# ============================================================
networks:
  skillport-net:
    driver: bridge
